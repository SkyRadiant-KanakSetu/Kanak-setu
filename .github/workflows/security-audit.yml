name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  prod-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit (fail on critical)
        run: npm run audit:prod
